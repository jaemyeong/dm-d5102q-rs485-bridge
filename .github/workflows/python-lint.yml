name: Python Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: python -m pip install --upgrade ruff black
      - name: Run ruff
        run: |
          if find tools tests -name '*.py' -print -quit | grep -q .; then
            ruff check tools tests
          else
            echo "No Python files yet."
          fi
      - name: Run black check
        run: |
          if find tools tests -name '*.py' -print -quit | grep -q .; then
            black --check tools tests
          else
            echo "No Python files yet."
          fi
