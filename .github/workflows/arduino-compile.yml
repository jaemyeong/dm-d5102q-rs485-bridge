name: Arduino Compile

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compile:
    name: Compile ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - name: atoms3-lite
            sketch: firmware/atoms3-lite
            fqbn: m5stack:esp32:m5stack_atoms3
          - name: atom-lite
            sketch: firmware/atom-lite
            fqbn: m5stack:esp32:m5stack_atom
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare secrets placeholder
        run: |
          if [ -f "${{ matrix.board.sketch }}/secrets.h.example" ] && [ ! -f "${{ matrix.board.sketch }}/secrets.h" ]; then
            cp "${{ matrix.board.sketch }}/secrets.h.example" "${{ matrix.board.sketch }}/secrets.h"
          fi
      - name: Check sketch presence
        id: sketch
        run: |
          if find "${{ matrix.board.sketch }}" -maxdepth 1 -name '*.ino' -print -quit | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No sketch file yet; skipping compile during scaffolding."
          fi
      - name: Compile sketch
        if: steps.sketch.outputs.exists == 'true'
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.board.fqbn }}
          sketch-paths: |
            ${{ matrix.board.sketch }}
          platforms: |
            - name: m5stack:esp32
              source-url: https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
          libraries: |
            - name: M5Atom
            - name: M5AtomS3
            - name: ESP Async WebServer
            - name: Async TCP
            - name: ArduinoJson
